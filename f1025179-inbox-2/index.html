(function(){
var data = {"project":{"name":"Inbox","description":"Default project for uncategorised captures","color":"#6366f1","thumbnail":null},"exportedAt":1775778538124,"privacyLevel":"full","records":[{"id":"04ee8d92-f4e3-48c6-a9a0-0ab77a2c8816","title":"Generic Email Response","site":"upload","sourceLabel":"File · Letter.pdf","capturedAt":1775773587359,"tags":["business correspondence","letter format","email template","salutation","closing","Lorem ipsum","typography","communication","professionalism","business etiquette","letter writing","email composition","formal communication","corporate email","mail"],"url":null,"filePath":"files/Letter.pdf","fileName":"Letter.pdf","summary":"This document represents a standard business letter with a formal salutation and closing, illustrating basic communication conventions.","rawText":"Your Name  123 Your Street  Your City, ST 12345  (123) 456-7890  no_reply@example.com  4th September 20XX  Ronny Reader  CEO, Company Name  123 Address St  Anytown, ST 12345  Dear Ms. Reader,  Lorem ipsum dolor sit amet, consectetuer adipiscing elit, sed diam nonummy nibh euismod tincidunt ut laoreet dolore magna aliquam erat volutpat. Ut wisi enim ad minim veniam, quis nostrud exerci tation ullamcorper suscipit lobortis nisl ut aliquip ex ea commodo consequat.  Duis autem vel eum iriure dolor in hendrerit in vulputate velit esse molestie consequat, vel illum dolore eu feugiat nulla facilisis at vero eros et accumsan.  Nam liber tempor cum soluta nobis eleifend option congue nihil imperdiet doming id quod mazim placerat facer possim assum. Typi non habent claritatem insitam; est usus legentis in iis qui facit eorum claritatem. Investigationes demonstraverunt lectores legere me lius quod ii legunt saepius.  Sincerely,  Your Name","annotations":[]},{"id":"7afc7793-6b82-4903-9d9a-1371bfed6b33","title":"Canadian Empires: Indigenous & European","site":"gemini","sourceLabel":"Gemini","capturedAt":1775504553892,"tags":["french empire","british empire","settler colonialism","new france","hudson's bay company","treaty of paris","confederation","dominion of canada","royal proclamation of 1763","statute of westminster","commonwealth","imperial rule","colonialism","indigenous sovereignty","fur trade"],"url":"https://gemini.google.com/app/90699760222c6f07","summary":"The history of empires in Canada encompasses periods of French and British colonial rule, characterized by the establishment of trading empires, territorial expansion, and eventual transition towards self-governance and national identity.","rawText":"[USER]\nTell me the history of empires in canada\n\n[ASSISTANT]\nThe history of \"empires\" in Canada is primarily a narrative of competition between European powers and the complex relationships they formed—or dismantled—with the Indigenous nations that held sovereignty long before European arrival.\n\n## Pre-Colonial Indigenous Sovereignty\n\nWhile not \"empires\" in the Roman or British sense, several Indigenous confederacies operated with imperial levels of influence:\n\n- **The Haudenosaunee (Iroquois) Confederacy:** A powerful political and military alliance that controlled vast territories through diplomacy and warfare, significantly influencing the fur trade.\n- **The Blackfoot Confederacy:** Dominating the western plains, they maintained a large territorial expanse through sophisticated social structures and military prowess.\n\n---\n\n## The French Empire: New France (1534–1763)\n\nThe French era began with **Jacques Cartier’s** voyages, but permanent settlement took root with **Samuel de Champlain** in 1608.\n\n- **Focus:** The \"Empire of the St. Lawrence\" was built on the **Fur Trade**. Rather than large-scale farming, the French focused on a vast network of trading posts and alliances with Indigenous groups like the Wyandot (Huron).\n- **Structure:** New France was governed as a royal province of the French Crown, characterized by the *seigneurial system* (a semi-feudal land distribution method).\n- **Fall:** Following the **Seven Years' War**, the French ceded their North American claims to the British via the **Treaty of Paris (1763)**, though the cultural and legal \"empire\" of French influence remained in Quebec.\n\n---\n\n## The British Empire (1763–1867)\n\nAfter 1763, Britain became the dominant imperial power in North America.\n\n- **Royal Proclamation of 1763:** An important constitutional document that recognized Indigenous land rights, partly to prevent further conflict after the fall of New France.\n- **Hudson’s Bay Company (HBC):** Perhaps the most unique \"corporate empire.\" For nearly 200 years, the HBC held a royal monopoly over **Rupert’s Land** (the entire Hudson Bay drainage basin), effectively acting as the government over a third of the continent.\n- **The Loyalist Influx:** Following the American Revolution, tens of thousands of British loyalists fled north, fundamentally shifting the demographics and ensuring Canada remained under the British Crown rather than joining the United States.\n\n---\n\n## Transition to Self-Governance (1867–Present)\n\nThe \"Imperial\" phase of Canadian history began to dissolve into a \"National\" phase in the mid-19th century.\n\n- **Confederation (1867):** The British North America Act created the **Dominion of Canada**. While Canada gained control over internal affairs, Britain still managed its foreign policy.\n- **The Statute of Westminster (1931):** This marked the formal end of British legislative authority over Canada. Canada became an equal member of the **Commonwealth**, a voluntary association of independent states.\n- **Patriation of the Constitution (1982):** Canada gained full control over its constitution, ending the final formal legal link to the British Parliament, though it remains a **Constitutional Monarchy** with the British monarch as the ceremonial Head of State.\n\n> **Key Context:** The history of empires in Canada is often viewed today through the lens of **Settler Colonialism**, acknowledging how European imperial expansion resulted in the displacement of Indigenous peoples and the long-term impact of colonial policies.","annotations":[]},{"id":"3f80b611-9fb5-4a87-af5c-6d845fd1b76e","title":"Israel Empires: Ancient to Byzantine","site":"gemini","sourceLabel":"Gemini","capturedAt":1775504270391,"tags":["ancient near eastern hegemony","neo-assyrian empire","neo-babylonian empire","persian empire","hellenistic empires","roman empire","byzantine empire","islamic caliphates","crusades","mamluk sultanate","ottoman empire","mandate for palestine","british empire","ancient romans"],"url":"https://gemini.google.com/app/4536504a0d24090d","summary":"The history of empires in Israel spans millennia, encompassing influences from ancient Egyptian, Assyrian, Babylonian, Persian, Hellenistic, Roman, Byzantine, Islamic, and Ottoman powers, culminating in the British Mandate for Palestine and the establishment of the modern State of Israel.","rawText":"[USER]\nTell me about the history of empires in isreal\n\n[ASSISTANT]\nThe history of empires in the region of modern-day Israel is a complex narrative of shifting powers, as the area served as a vital land bridge between Africa, Asia, and Europe. Control of this territory was often a strategic necessity for the dominant superpowers of the ancient and medieval worlds.\n\n### Ancient Near Eastern Hegemony\n\nIn the early Bronze Age, the region was primarily under the sphere of influence of the **Egyptian Empire**. However, as the Late Bronze Age collapsed, local powers like the Kingdoms of Israel and Judah emerged.\n\n- **The Neo-Assyrian Empire:** In the 8th century BCE, the Assyrians expanded westward. They conquered the Northern Kingdom of Israel in **722 BCE**, leading to the displacement of much of its population.\n- **The Neo-Babylonian Empire:** Following the fall of Assyria, the Babylonians under Nebuchadnezzar II took control. They besieged Jerusalem, destroyed the First Temple in **586 BCE**, and initiated the Babylonian Captivity.\n- **The Persian (Achaemenid) Empire:** Cyrus the Great conquered Babylon in **539 BCE**. The Persians were known for a policy of relative religious tolerance, allowing exiled groups to return and rebuild Jerusalem.\n\n---\n\n### Greco-Roman and Byzantine Eras\n\nThe arrival of Alexander the Great shifted the region from Eastern to Western imperial influence.\n\n- **The Hellenistic Empires:** After Alexander’s death in **323 BCE**, the region was contested between the **Ptolemaic Empire** (based in Egypt) and the **Seleucid Empire** (based in Syria). Seleucid attempts to enforce Greek culture eventually led to the Maccabean Revolt.\n- **The Roman Empire:** Rome first intervened in **63 BCE** under Pompey the Great. By **6 CE**, it became a formal Roman province. This era saw the destruction of the Second Temple in **70 CE** and the renaming of the province to *Syria Palaestina* after the Bar Kokhba revolt.\n- **The Byzantine Empire:** After the Roman Empire split, the region remained under the Eastern Roman (Byzantine) administration, becoming a major center for Christian pilgrimage.\n\n---\n\n### The Islamic Caliphates and the Crusades\n\nThe 7th century marked a major religious and political shift in the Levant.\n\n- **The Rashidun and Umayyad Caliphates:** Islamic forces took Jerusalem in **638 CE**. Under the Umayyads, the Dome of the Rock was constructed.\n- **The Abbasid and Fatimid Caliphates:** Control shifted to Baghdad (Abbasids) and later to Cairo (Fatimids), though the region often suffered from instability during these transitions.\n- **The Crusader States:** In **1099**, the First Crusade established the **Kingdom of Jerusalem**. This Latin Christian rule lasted until **1187**, when Saladin, founder of the **Ayyubid Dynasty**, recaptured the city.\n\n---\n\n### Mamluk and Ottoman Rule\n\n- **The Mamluk Sultanate:** Based in Egypt, the Mamluks expelled the last of the Crusaders in the late 13th century and governed the region as a province for over 200 years.\n- **The Ottoman Empire:** Sultan Selim I conquered the region in **1517**. The Ottomans ruled for four centuries, significantly shaping the infrastructure and legal systems. Their reign lasted until the empire’s collapse following World War I.\n\n---\n\n### The 20th Century Transition\n\n- **The British Empire:** Following the defeat of the Ottomans, the League of Nations granted Britain the **Mandate for Palestine** in **1920**. This period of British administration lasted until **1948**, ending with the withdrawal of British forces and the establishment of the State of Israel.","annotations":[]},{"id":"11845f77-1194-4c21-93ca-f1a5e5224029","title":"Brazil's Empires: History & Shifts","site":"gemini","sourceLabel":"Gemini","capturedAt":1775503612016,"tags":["brazil history","empire of brazil","portuguese empire","royal flight","dom pedro i","dom pedro ii","coffee production","abolition of slavery","golden law","military coup","rubber boom","sugar cycle","transiberian railway","dynastic cycle","social media"],"url":"https://gemini.google.com/app/a959275a366c1e96","summary":"This text describes the history of empires in Brazil, including the Portuguese colonial period, the Empire of Brazil from 1822 to 1889, and notable economic empires like the rubber boom and sugar cycle.","rawText":"[USER]\nTell me about empires in Brazil\n\n[ASSISTANT]\nThe history of empires in Brazil is unique in the Americas because it transitioned from a colony to a sovereign empire under the same royal dynasty. This period, known as the **Empire of Brazil (1822–1889)**, is characterized by a centralized constitutional monarchy that lasted nearly seven decades.\n\n---\n\n### 1. The Portuguese Empire (1500–1822)\n\nBefore becoming an independent empire, Brazil was the most significant colony of the Portuguese Empire.\n\n- **The Royal Flight (1808):** In a rare historical event, the Portuguese Royal Family fled to Brazil to escape Napoleon’s invading armies. Rio de Janeiro became the capital of the entire Portuguese Empire, making Brazil the only colony in history to serve as the seat of government for its mother country.\n- **The United Kingdom of Portugal, Brazil, and the Algarves:** In 1815, Brazil was elevated from a colony to a kingdom equal to Portugal.\n\n### 2. The Empire of Brazil (1822–1889)\n\nWhen King João VI returned to Portugal, his son, **Pedro I**, remained. In 1822, he declared independence with the famous \"Cry of Ipiranga.\"\n\n| Era | Monarch | Key Events & Characteristics |\n| --- | --- | --- |\n| First Reign (1822–1831) | Dom Pedro I | A period of instability. Pedro I granted the first Constitution in 1824, which created the \"Moderating Power,\" giving the Emperor significant authority. He eventually abdicated in favor of his 5-year-old son. |\n| Regency Period (1831–1840) | Regents | A chaotic decade where various leaders ruled until the heir was old enough. It was marked by numerous regional revolts and civil wars. |\n| Second Reign (1840–1889) | Dom Pedro II | The \"Golden Age.\" Pedro II ruled for 49 years, bringing stability and modernization (railroads, telegraphs). He was a highly intellectual leader who valued science and the arts. |\n\n---\n\n### 3. Key Social and Economic Shifts\n\n- **Coffee Production:** During the 19th century, coffee became the primary export, fueling the empire’s economy and creating a powerful class of \"Coffee Barons.\"\n- **The Abolition of Slavery:** Brazil was the last country in the Americas to abolish slavery. The process was gradual, ending with the **Golden Law (Lei Áurea)** in 1888, signed by Princess Isabel while her father, Pedro II, was in Europe.\n\n### 4. The Fall of the Empire\n\nThe abolition of slavery was the final blow to the monarchy, as it alienated the wealthy landowners who were the Crown's main supporters. On **November 15, 1889**, a military coup led by Marshal Deodoro da Fonseca overthrew the Empire and established the Republic of Brazil. Dom Pedro II and his family were exiled to Europe without resistance.\n\n### 5. Notable Non-State \"Empires\"\n\nWhile not political empires, Brazil’s history is often defined by economic \"cycles\" that behaved like commercial empires:\n\n- **The Rubber Boom:** In the late 19th century, the Amazon held a global monopoly on rubber, creating immense wealth and \"rubber barons\" who built European-style opera houses in the middle of the jungle.\n- **The Sugar Cycle:** During the colonial era, the Northeast was the global center of sugar production, dictating transatlantic trade for over a century.","annotations":[]},{"id":"1d4db623-e799-492a-a8aa-766bbcf84eff","title":"South America Empire History","site":"gemini","sourceLabel":"Gemini","capturedAt":1775503334354,"tags":["wari empire","tiwanaku","inca empire","chimu empire","quipu","qapaq ñan","mita system","el dorado","brazil empire","tahuantinsuyu","andean empires","south america history","imperial rule","ancient civilizations","administrative genius"],"url":"https://gemini.google.com/app/3b5d67b596f31a4a","summary":"The history of empires in South America encompasses distinct civilizations like the Wari, Tiwanaku, Chimu, Inca, and Muisca, each contributing unique legacies through infrastructure, religious influence, and innovative systems of governance and labor.","rawText":"[USER]\nTell me about the history of empires in South America\n\n[ASSISTANT]\nThe history of empires in South America is defined by highly sophisticated civilizations that adapted to some of the most rugged terrains on Earth, from the high Andes to the arid coasts. While many cultures thrived, two primary imperial traditions—the **Wari and Tiwanaku** and the later **Inca Empire**—stand out for their scale and administrative genius.\n\n---\n\n### 1. The Middle Horizon (600 CE – 1000 CE)\n\nBefore the famous Inca, two distinct but contemporaneous powers dominated the central Andes. This era is often called the \"Middle Horizon.\"\n\n- **The Wari Empire:** Based in the central highlands of Peru, the Wari were masters of urban planning and infrastructure. They developed the first major road systems and terrace farming techniques that the Inca would later perfect. They were more militaristic and focused on administrative hubs.\n- **The Tiwanaku State:** Centered around Lake Titicaca in modern-day Bolivia, Tiwanaku was a more religious and cultural \"soft power\" empire. They were famed for their monumental stone architecture and the ability to sustain a massive population at an altitude of over 12,000 feet.\n\n### 2. The Chimu Empire (900 CE – 1470 CE)\n\nOn the northern coast of Peru, the **Chimor** kingdom (the Chimu people) rose as a massive coastal power.\n\n- **Capital:** Chan Chan, the largest adobe city in the world.\n- **Specialty:** They were incredible goldsmiths and hydraulic engineers, creating vast irrigation systems to turn desert valleys into fertile farmland. They were eventually conquered by the Inca in the late 15th century.\n\n### 3. The Inca Empire (1438 CE – 1533 CE)\n\nThe **Tahuantinsuyu** (Land of the Four Quarters) was the largest empire in pre-Columbian America, stretching nearly 2,500 miles from modern-day Colombia to Chile.\n\n- **Expansion:** Under leaders like Pachacuti, the Inca expanded rapidly through a mix of military conquest and peaceful assimilation.\n- **The Quipu:** Lacking a written alphabet, they used a complex system of knotted strings called *quipus* to record census data, taxes, and inventory.\n- **Infrastructure:** The **Qhapaq Ñan** (Inca Road System) covered over 25,000 miles, allowing *chasquis* (relay runners) to deliver messages across the empire in days.\n- **Mita System:** This was a mandatory public service labor tax used to build temples, roads, and bridges, ensuring the empire’s massive projects were always staffed.\n\n### 4. The Muisca Confederation\n\nWhile not a centralized \"empire\" in the Roman or Inca sense, the Muisca in modern-day Colombia formed a highly organized and wealthy confederation. They were the source of the **El Dorado** legends due to their ritual of covering their leaders in gold dust before they dove into Lake Guatavita.\n\n---\n\n### 5. The Colonial Shift and the Empire of Brazil\n\nThe arrival of Spanish conquistadors in the 1530s led to the fall of the Inca and the transition into European colonial rule. However, South America saw one last indigenous-style \"empire\" through a European lens:\n\n- **The Empire of Brazil (1822–1889):** After Napoleon invaded Portugal, the Portuguese royal family fled to Brazil. Eventually, Brazil declared independence but remained a monarchy under **Emperors Pedro I and Pedro II**. It was a unique period where a South American nation was ruled as a formal constitutional empire for nearly 70 years before becoming a republic.\n\n---\n\n### Key Comparison of Andean Empires\n\n| Empire | Peak Era | Primary Strength | Key Legacy |\n| --- | --- | --- | --- |\n| Wari | 800 CE | Infrastructure | Administrative Road Networks |\n| Tiwanaku | 700 CE | Religious Influence | High-Altitude Agriculture |\n| Chimu | 1200 CE | Metallurgy/Irrigation | Massive Adobe Cities (Chan Chan) |\n| Inca | 1500 CE | Total State Control | Machu Picchu, Quipu, Mita System |","annotations":[]},{"id":"1230e60c-e769-4988-9ea9-3f94fb56128f","title":"Chinese Empire History","site":"gemini","sourceLabel":"Gemini","capturedAt":1775503304025,"tags":["chinese empire","qing dynasty","han dynasty","shu dynasty","tang dynasty","yin dynasty","song dynasty","ming dynasty","forbidden city","great wall","silk road","mandate of heaven","civil service exam","dynastic cycle","xinhai revolution","gunpowder","moveable type printing","imperial rule","ethnic han","marco polo","kublai khan","forbidden city","great wall","silk road","gunpowder","compass","moveable type printing"],"url":"https://gemini.google.com/app/beb897f94c16659e","summary":"The Chinese Empire spanned over two millennia, beginning in 221 BCE and concluding with the fall of the Qing Dynasty in 1912 CE, marked by periods of unified rule, fragmentation, and significant advancements in culture, technology, and political systems.","rawText":"[USER]\nTell me about the the history of the chinese empire\n\n[ASSISTANT]\nThe history of the Chinese Empire is a vast, 2,000-year narrative characterized by alternating periods of unification, fragmentation, and cultural evolution. It officially began in **221 BCE** and ended with the fall of the Qing Dynasty in **1912 CE**.\n\n### 1. The Foundation: Qin and Han (221 BCE – 220 CE)\n\nThe imperial era began when **Qin Shi Huang** conquered the warring states and unified China.\n\n- **Qin Dynasty:** Though short-lived, it established the centralized bureaucracy, standardized weights and measures, and began the Great Wall.\n- **Han Dynasty:** Often considered a \"Golden Age,\" the Han solidified Confucianism as the state ideology and opened the **Silk Road**, linking China to the West. The majority ethnic group in China still refers to itself as \"Han\" today.\n\n### 2. Fragmentation and Reunification (220 CE – 960 CE)\n\nAfter the Han fell, China endured centuries of division (the Three Kingdoms and Six Dynasties) before being reunited.\n\n- **Sui Dynasty:** Reunified China and built the **Grand Canal**, a massive engineering feat connecting the north and south.\n- **Tang Dynasty:** Known for its cosmopolitan culture, poetry, and expansion. Buddhism flourished, and the empire reached a peak of political and military power.\n\n### 3. Innovation and Conquest (960 CE – 1368 CE)\n\n- **Song Dynasty:** A period of immense technological advancement, including the invention of **gunpowder, the compass, and moveable type printing**. It saw the rise of a sophisticated merchant class.\n- **Yuan Dynasty:** Founded by **Kublai Khan**, this marked the first time all of China was ruled by a foreign power (the Mongols). It was during this time that Marco Polo famously visited China.\n\n### 4. The Final Dynasties (1368 CE – 1912 CE)\n\nThe later imperial period was defined by a return to ethnic Han rule followed by the final Manchu conquest.\n\n- **Ming Dynasty:** Known for the construction of the **Forbidden City** and the maritime expeditions of Zheng He. The Ming were famous for their porcelain and the final fortification of the Great Wall.\n- **Qing Dynasty:** Founded by the Manchus, it was the second foreign dynasty and the final imperial house. At its height, it was one of the largest empires in history. However, internal rebellions and external pressure from Western colonial powers (the \"Century of Humiliation\") eventually led to its collapse.\n\n---\n\n### Key Structural Elements\n\nThe Chinese Empire was held together by several consistent pillars:\n\n- **The Mandate of Heaven:** The belief that an emperor ruled by divine right, but could lose that right if they became corrupt or if natural disasters occurred.\n- **The Civil Service Exam:** A meritocratic system that allowed citizens to become government officials based on their knowledge of Confucian texts rather than just noble birth.\n- **Dynastic Cycle:** The historical pattern of a new dynasty establishing peace, becoming corrupt, declining, and eventually being replaced.\n\nThe empire ended in 1912 following the **Xinhai Revolution**, which established the Republic of China and brought an end to over two millennia of imperial rule.","annotations":[]},{"id":"0eedc186-7a2b-4f76-bc8f-aa4145d3baea","title":"Russian Empire History: A Concise Overview","site":"gemini","sourceLabel":"Gemini","capturedAt":1775502874549,"tags":["russian empire","peter the great","st. peterburg","westernization","great northern war","catherine the great","enlightened absolutism","serfdom","alexander ii","trans-iberian railway","napoleonic wars","1905 revolution","duma","world war i","bheviks","romanov family","orthodoxy","multi-ethnicity"],"url":"https://gemini.google.com/app/e41a273423bbe0d5","summary":"The Russian Empire, a vast geopolitical entity, underwent significant transformations from its founding in 1721 under Peter the Great through periods of expansion, reform, and ultimately, collapse during World War I and the subsequent revolutions.","rawText":"[USER]\nTell me about the the history of the russian empire\n\n[ASSISTANT]\nThe Russian Empire was one of the largest contiguous empires in human history, stretching across three continents—Europe, Asia, and North America—at its peak. Its history is characterized by rapid territorial expansion, absolute autocracy, and a tension between Western modernization and traditional Slavic identity.\n\n---\n\n## **The Foundation (1721)**\n\nWhile the Tsardom of Russia had existed for centuries, the **Russian Empire** was formally proclaimed by **Peter the Great** in 1721 following his victory over Sweden in the Great Northern War.\n\n- **Westernization:** Peter moved the capital from Moscow to his \"window on the West,\" **St. Petersburg**. He forcibly modernized the military, administration, and even the appearance of the nobility.\n- **Great Northern War:** This established Russia as the dominant power in the Baltic region.\n\n## **The Golden Age (1762–1796)**\n\nUnder **Catherine the Great**, a German princess who took the throne in a coup, the empire reached a cultural and political zenith.\n\n- **Territorial Gains:** Catherine expanded the empire southward to the Black Sea (annexing Crimea) and westward into Poland.\n- **Enlightened Absolutism:** She corresponded with European philosophers like Voltaire and promoted education and the arts, though she strictly maintained the institution of **serfdom**, which kept the majority of the population in near-slavery.\n\n## **The 19th Century: Power and Reform**\n\nThe 1800s were a period of massive global influence and internal struggle.\n\n- **Napoleonic Wars:** In 1812, Russia famously defeated Napoleon’s Grande Armée, cementing its status as a \"Gendarmes of Europe\" (the continent's policeman).\n- **The Great Reforms:** In 1861, **Alexander II** (the \"Tsar-Liberator\") abolished serfdom. However, the lack of land for the newly freed peasants created deep-seated resentment.\n- **Industrialization:** Toward the end of the century, the empire began a rapid, state-sponsored industrial push, including the construction of the **Trans-Siberian Railway**.\n\n## **Collapse (1905–1917)**\n\nThe early 20th century saw the empire crumble under the weight of social inequality and military failure.\n\n- **1905 Revolution:** Following a humiliating defeat in the Russo-Japanese War, a wave of mass unrest forced Tsar Nicholas II to grant a constitution and create an elected parliament (the **Duma**).\n- **World War I:** The immense casualties and economic strain of WWI proved to be the breaking point.\n- **1917 Revolutions:** In February 1917, the monarchy was overthrown. By October, the **Bolsheviks**, led by Vladimir Lenin, seized power, leading to the execution of the Romanov family and the eventual formation of the Soviet Union (USSR).\n\n---\n\n### **Key Characteristics of the Empire**\n\n| Feature | Description |\n| --- | --- |\n| Autocracy | The Tsar held absolute power, believed to be divinely ordained. |\n| Orthodoxy | The Russian Orthodox Church was the state religion and a pillar of social stability. |\n| Multi-ethnicity | Despite \"Russification\" policies, the empire housed over 100 ethnic groups. |\n| Expansion | At its height, the empire covered nearly 1/6th of the Earth's landmass. |","annotations":[]},{"id":"9525a3c2-2da6-49e0-8eaa-4c706e2fe6f0","title":"Ancient Greece: Key Periods & Figures","site":"chatgpt","sourceLabel":"ChatGPT","capturedAt":1775500826383,"tags":["roman empire","ancient rome","augustus","roman civilization","governance","roman law","pax romana","colosseum","pantheon","roman life","ancient romans","greek history","greek civilization","greek-persian wars","macedonian empire"],"url":"https://chatgpt.com/c/69d3fdef-188c-83e8-83ac-8c3bd4195f86","summary":"The provided text discusses aspects of ancient Greek and Roman history, highlighting figures, conflicts, and achievements from both civilizations.","rawText":"[USER]\nTell me about the ancient greek empire.\n\n[ASSISTANT]\nThe **Ancient GreeceAthensSpartaCorinthThebesGreco-Persian WarsAchaemenid EmpirePeloponnesian WarAthensSpartaAlexander the GreatMacedonian EmpireSocratesPlatoAristotleAthensPythagorasArchimedesThe IliadThe OdysseyHomerAncient Olympic GamesOlympiaRoman Republic**","annotations":[]},{"id":"ce6613b9-7a3e-4ea5-9745-560083b46d74","title":"Roman Empire: Origins, Governance & Impact","site":"gemini","sourceLabel":"Gemini","capturedAt":1775449112675,"tags":["roman empire","roman civilization","ancient rome","augustus","pax romana","governance","roman law","concrete","colosseum","pantheon","latin","byzantine empire","fall of the west","diocletian","western roman empire","eastern roman empire","social media","pompeii","graffiti","roman life","thermopolia","fast food","volcanic ash","pozzolana","roman concrete","sea walls","ancient romans","food","urban planning"],"url":"https://gemini.google.com/app/29a5a32c1a5e11a3","summary":"Ancient Romans utilized innovative building materials like volcanic ash in durable concrete, developed street-side dining options, and expressed themselves using public inscriptions on walls.","rawText":"[USER]\nTell me about the roman empire\n\n[ASSISTANT]\nThe Roman Empire was one of the most influential civilizations in human history, at its height governing a vast territory that spanned three continents: Europe, Africa, and Asia. It shaped modern Western law, language, architecture, and government.\n\n---\n\n### **1. Origins and Transition**\n\nThe Empire began in **27 BCE** when Octavian, later known as **Augustus**, became the first emperor, ending nearly five centuries of the Roman Republic. This transition followed a period of civil unrest and the high-profile assassination of Julius Caesar. Augustus established the *Pax Romana* (Roman Peace), a two-century period of relative stability and expansion.\n\n### **2. Governance and Engineering**\n\nThe Romans were masters of practical application. Their contributions include:\n\n- **The Military:** A highly professionalized legionary system that utilized advanced tactics and engineering to maintain borders.\n- **Infrastructure:** An incredible network of roads (many still existing), aqueducts to transport water, and the invention of **concrete**, which allowed for massive structures like the **Colosseum** and the **Pantheon**.\n- **Civil Law:** The development of legal principles, such as \"innocent until proven guilty,\" which form the basis of many modern legal systems.\n\n### **3. Life and Culture**\n\nRoman society was highly hierarchical, ranging from wealthy patricians to commoners (plebeians) and a massive population of enslaved people.\n\n- **Language:** Latin became the \"lingua franca\" of the West, evolving into the Romance languages (Spanish, French, Italian, etc.) and heavily influencing English.\n- **Entertainment:** Public spectacles were central to urban life, including gladiator games, chariot races at the Circus Maximus, and theater.\n\n### **4. Expansion and Division**\n\nAt its territorial peak in **117 CE** under Emperor Trajan, the Empire stretched from Northern England (Hadrian's Wall) to the Persian Gulf. However, the sheer size made it difficult to govern.\n\n- In **285 CE**, Emperor Diocletian divided the empire into **Western** and **Eastern** halves.\n- The Eastern half, known as the **Byzantine Empire**, with its capital at Constantinople, flourished for another thousand years after the West fell.\n\n### **5. The Fall of the West**\n\nThe Western Roman Empire officially ended in **476 CE** when the Germanic leader Odoacer deposed the last emperor, Romulus Augustulus. Contributing factors included:\n\n- Invasions by Germanic tribes (Visigoths, Vandals, etc.).\n- Economic inflation and over-taxation.\n- Political corruption and constant power struggles.\n- The rise of Christianity, which shifted the cultural and social focus of the state.\n\n---\n\n### **Quick Stats**\n\n| Category | Detail |\n| --- | --- |\n| Duration | 27 BCE – 476 CE (West); 1453 CE (East) |\n| Peak Population | Estimated 50 to 90 million people |\n| Official Language | Latin (West), Greek (East) |\n| Major Religions | Roman Polytheism, then Christianity |\n\n[USER]\ngve me more\n\n[ASSISTANT]\nTo dive a bit deeper, the Roman Empire wasn't just about emperors and wars; it was a sophisticated machine of logistics, social engineering, and urban planning. Here are some of the more nuanced aspects of Roman life and influence.\n\n---\n\n### **The Roman \"Internet\": Roads and Communication**\n\nThe Romans built over **400,000 kilometers** of roads, including 80,000 kilometers of stone-paved highways.\n\n- **Military Mobility:** These roads were primarily designed to move legions quickly to trouble spots.\n- **The Cursus Publicus:** This was the state-run courier service. Using a series of relay stations with fresh horses, a message could travel up to 80 kilometers a day—unmatched speed until the invention of the telegraph.\n\n### **Urban Innovation and Public Health**\n\nWhile many ancient cities were cramped and unsanitary, Rome pioneered public health through engineering:\n\n- **Aqueducts:** Rome was fed by 11 major aqueducts that provided nearly a cubic meter of water per person per day—more than many modern cities provide today.\n- **The Cloaca Maxima:** One of the world's earliest sewage systems, it carried waste away from the city and into the Tiber River, significantly reducing the spread of disease in a city of over a million people.\n- **Public Baths:** These were not just for hygiene; they were social hubs, gyms, and libraries where people of different social classes interacted.\n\n### **Economic Complexity**\n\nThe Roman economy was surprisingly modern in its structure:\n\n- **Currency:** A standardized system of gold (*aureus*), silver (*denarius*), and bronze coins allowed for seamless trade from Britain to Egypt.\n- **Trade Routes:** They maintained \"The Silk Road\" connections with Han China and imported spices and incense from India and Arabia.\n- **Hyper-Specialization:** Large-scale commercial farms (*latifundia*) produced massive surpluses of grain, olive oil, and wine for export, making Rome the first truly globalized economy.\n\n### **Social Mobility and Citizenship**\n\nUnlike many contemporary empires, Rome eventually used **citizenship** as a tool for integration rather than just an exclusive club.\n\n- **The Edict of Caracalla (212 CE):** This granted full Roman citizenship to all free men within the empire’s borders.\n- **Manumission:** Rome had a unique system where enslaved people could be granted or buy their freedom. These \"freedmen\" became citizens, and their children had full legal rights, allowing for a degree of social climbing over generations.\n\n### **The \"Crisis of the Third Century\"**\n\nBefore the final fall, the Empire nearly collapsed 200 years early. Between **235 and 284 CE**, there were over 20 \"Barracks Emperors\" who mostly took power via military coup and were quickly assassinated. This era of hyperinflation and civil war forced the Empire to become a more rigid, militarized state under Diocletian to survive.\n\n---\n\n### **Did You Know?**\n\n- **Social Media:** Romans used \"graffiti\" to express everything from political endorsements to romantic complaints on city walls in Pompeii.\n- **Fast Food:** Most Romans lived in apartments (*insulae*) without kitchens. They ate at *thermopolia*, which were essentially street-side fast-food stalls with counters and hot storage jars.\n- **Concrete Secrets:** Roman concrete was so durable because they used **volcanic ash** (pozzolana). When used in sea walls, it actually gets stronger over time through a chemical reaction with saltwater.\n\nWould you like to focus on a specific area, like their military tactics, daily life in the city, or perhaps the lives of specific emperors?","annotations":[]}]};

function resolveUrl(href,base){
  if(!href||href.indexOf('http://')===0||href.indexOf('https://')===0||href.indexOf('data:')===0) return href;
  if(!base) return href;
  try{return new URL(href,base).href}catch(e){return href}
}

function inlineMd(t,srcUrl){
  // Handle images before escaping
  var imgs=[];
  t=t.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,function(_,a,s){var tok='__I'+imgs.length+'__';imgs.push({a:a,s:resolveUrl(s,srcUrl)});return tok});
  t=esc(t);
  t=t.replace(/`([^`]+)`/g,'<code style="background:var(--bg3);padding:1px 4px;border-radius:3px;font-size:12px">$1</code>');
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  t=t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,function(_,text,url){return '<a href="'+resolveUrl(url,srcUrl)+'" target="_blank" style="color:var(--accent)">'+text+'</a>'});
  for(var i=0;i<imgs.length;i++){t=t.replace('__I'+i+'__','<img src="'+imgs[i].s+'" alt="'+esc(imgs[i].a)+'" style="max-width:100%;height:auto;border-radius:6px;margin:8px 0;border:1px solid var(--border)" />')}
  return t;
}

    if(line.match(/^(-{3,}|\*{3,}|_{3,})$/)){closeLists();html+='<hr style="border:none;border-top:1px solid var(--border);margin:12px 0">';continue}
    if(line.match(/^[-*]\s+/)){if(!inList||listType!=='ul'){closeLists();html+='<ul style="padding-left:20px;margin:6px 0">';inList=true;listType='ul'}html+='<li style="margin:3px 0">'+inlineMd(line.replace(/^[-*]\s+/,''),srcUrl)+'</li>';continue}
    if(line.match(/^\d+\.\s+/)){if(!inList||listType!=='ol'){closeLists();html+='<ol style="padding-left:20px;margin:6px 0">';inList=true;listType='ol'}html+='<li style="margin:3px 0">'+inlineMd(line.replace(/^\d+\.\s+/,''),srcUrl)+'</li>';continue}
    if(line.indexOf('> ')===0){closeLists();html+='<blockquote style="border-left:3px solid var(--accent);padding:4px 12px;margin:8px 0;color:var(--muted)">'+inlineMd(line.slice(2),srcUrl)+'</blockquote>';continue}
    if(line.match(/^!\[.*\]\(.*\)$/)){closeLists();html+=inlineMd(line,srcUrl);continue}
    if(line.indexOf('|')===0&&line.lastIndexOf('|')===line.length-1){if(line.match(/^\|[\s\-|]+\|$/))continue;closeLists();var cells=line.split('|').slice(1,-1);html+='<div style="display:flex;border-bottom:1px solid var(--border)">';for(var j=0;j<cells.length;j++){html+='<span style="flex:1;padding:4px 8px;font-size:12px">'+inlineMd(cells[j].trim(),srcUrl)+'</span>'}html+='</div>';continue}
    closeLists();
    html+='<p style="margin:6px 0">'+inlineMd(line,srcUrl)+'</p>';
  }
  closeLists();
  if(inCode){html+='<pre style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px;margin:8px 0;overflow-x:auto"><code style="font-size:12px">'+esc(codeLines.join('\n'))+'</code></pre>'}
  return html;
}

function textSearch(query, list){
  if(!query) return list;
  var terms = query.toLowerCase().split(/\s+/).filter(function(t){return t.length > 0});
  var scored = [];
  for(var i=0;i<list.length;i++){
    var r = list[i];
    var title = (r.title||'').toLowerCase();
    var summary = (r.summary||'').toLowerCase();
    var tagStr = (r.tags||[]).join(' ').toLowerCase();
    var raw = (r.rawText||'').toLowerCase();
    var annotStr = '';
    if(r.annotations){for(var k=0;k<r.annotations.length;k++){annotStr+=(r.annotations[k].selectedText||'')+' '+(r.annotations[k].comment||'')+' '}}
    annotStr = annotStr.toLowerCase();
    var score = 0;
    for(var j=0;j<terms.length;j++){
      var t = terms[j];
      if(title.indexOf(t)>=0) score+=10;
      if(tagStr.indexOf(t)>=0) score+=8;
      if(summary.indexOf(t)>=0) score+=5;
      if(raw.indexOf(t)>=0) score+=2;
      if(annotStr.indexOf(t)>=0) score+=4;
    }
    if(score>0) scored.push({r:r,s:score});
  }
  scored.sort(function(a,b){return b.s-a.s});
  return scored.map(function(x){return x.r});
}

function matchesTags(r){
  if(!activeTagFilters.length) return true;
  var convTags = r.tags||[];
  for(var i=0;i<activeTagFilters.length;i++){
    var filter = activeTagFilters[i].toLowerCase();
    var found = false;
    for(var j=0;j<convTags.length;j++){
      var ct = convTags[j].toLowerCase();
      if(ct===filter || ct.indexOf(filter)>=0 || filter.indexOf(ct)>=0){found=true;break}
    }
    if(!found) return false;
  }
  return true;
}

function toggleTag(tag){
  var idx = activeTagFilters.indexOf(tag);
  if(idx>=0) activeTagFilters.splice(idx,1);
  else activeTagFilters.push(tag);
  render();
}

function clearTags(){
  activeTagFilters = [];
  render();
}

function renderFilters(){
  if(!activeTagFilters.length){filtersEl.innerHTML='';return}
  var html = '';
  for(var i=0;i<activeTagFilters.length;i++){
    html+='<button class="active-filter" data-tag="'+esc(activeTagFilters[i])+'">'+esc(activeTagFilters[i])+' \u2715</button>';
  }
  html+='<button class="clear-btn" id="clearTags">Clear</button>';
  filtersEl.innerHTML=html;
  var btns = filtersEl.querySelectorAll('.active-filter');
  for(var i=0;i<btns.length;i++){
    btns[i].addEventListener('click',function(e){toggleTag(this.getAttribute('data-tag'))});
  }
  var clearBtn = document.getElementById('clearTags');
  if(clearBtn) clearBtn.addEventListener('click',clearTags);
}

function render(){
  var query = searchEl.value.trim();
  var list = textSearch(query, records);
  list = list.filter(matchesTags);

  renderFilters();

  if(!list.length){
    resultsEl.innerHTML='<div class="empty">No results found.</div>';
    return;
  }

  var html='';
  for(var i=0;i<list.length;i++){
    var r=list[i];
    var bc='badge-'+(r.site||'web');
    var label=r.sourceLabel||r.site||'Unknown';
    var date=r.capturedAt?new Date(r.capturedAt).toLocaleDateString():'';
    var titleHtml=esc(r.title||'Untitled');
    var summaryHtml=r.summary?'<div class="summary">'+esc(r.summary)+'</div>':'';
    var tagsHtml='';
    if(r.tags&&r.tags.length){
      tagsHtml='<div class="tags">';
      for(var j=0;j<r.tags.length&&j<8;j++){
        var isActive=activeTagFilters.indexOf(r.tags[j])>=0;
        tagsHtml+='<span class="tag'+(isActive?' active':'')+'" data-tag="'+esc(r.tags[j])+'">'+esc(r.tags[j])+'</span>';
      }
      tagsHtml+='</div>';
    }
    var detailHtml='';
    if(r.rawText){
      var rawHtml=renderMarkdown(r.rawText,r.site,r.url);
      if(r.annotations&&r.annotations.length){
        for(var k=0;k<r.annotations.length;k++){
          var needle=esc(r.annotations[k].selectedText||'');
          if(needle.length<3) continue;
          var tip=esc(r.annotations[k].comment||'');
          var idx=rawHtml.indexOf(needle);
          if(idx>=0){
            rawHtml=rawHtml.slice(0,idx)+'<mark class="annotation-highlight" title="'+tip+'">'+needle+'</mark>'+rawHtml.slice(idx+needle.length);
          }
        }
      }
      detailHtml='<div class="full-text" id="detail-'+r.id+'">'+rawHtml+'</div>';
    }
    var annotHtml='';
    if(r.annotations&&r.annotations.length){
      annotHtml='<div class="annotations" id="annot-'+r.id+'"><div class="annotations-title">Annotations ('+r.annotations.length+')</div>';
      for(var k=0;k<r.annotations.length;k++){
        var a=r.annotations[k];
        var adate=a.createdAt?new Date(a.createdAt).toLocaleDateString():'';
        annotHtml+='<div class="annotation-card"><div class="annotation-quote">'+esc(a.selectedText)+'</div>';
        if(a.comment) annotHtml+='<div class="annotation-comment">'+esc(a.comment)+'</div>';
        annotHtml+='<div class="annotation-date">'+adate+'</div></div>';
      }
      annotHtml+='</div>';
    }
    var linkHtml='';
    if(r.url) linkHtml='<div class="source-link"><a href="'+esc(r.url)+'" target="_blank">Source Link</a></div>';
    else if(r.filePath) linkHtml='<div class="source-link"><a href="'+esc(r.filePath)+'" target="_blank">Open File</a></div>';

    html+='<div class="card" data-id="'+r.id+'">';
    html+='<div class="card-head"><span class="badge '+bc+'">'+esc(label)+'</span><span class="meta" style="margin-left:auto">'+date+'</span></div>';
    html+='<div class="card-title">'+titleHtml+'</div>';
    html+=summaryHtml;
    html+=tagsHtml;
    html+=detailHtml;
    html+=linkHtml;
    html+=annotHtml;
    html+='</div>';
  }
  resultsEl.innerHTML=html;

  // Tag click handlers
  var tagEls = resultsEl.querySelectorAll('.tag');
  for(var i=0;i<tagEls.length;i++){
    tagEls[i].addEventListener('click',function(e){
      e.stopPropagation();
      toggleTag(this.getAttribute('data-tag'));
    });
  }

  // Card click to expand/collapse detail
  
  var cards = resultsEl.querySelectorAll('.card');
  for(var i=0;i<cards.length;i++){
    cards[i].addEventListener('click',function(){
      var id = this.getAttribute('data-id');
      var detail = document.getElementById('detail-'+id);
      if(detail){
        var isOpen = detail.classList.contains('open');
        // Close all others
        var allDetails = resultsEl.querySelectorAll('.full-text.open');
        for(var j=0;j<allDetails.length;j++) allDetails[j].classList.remove('open');
        var allAnnots = resultsEl.querySelectorAll('.annotations.open');
        for(var j=0;j<allAnnots.length;j++) allAnnots[j].classList.remove('open');
        var allLinks = resultsEl.querySelectorAll('.source-link.open');
        for(var j=0;j<allLinks.length;j++) allLinks[j].classList.remove('open');
        var allCards = resultsEl.querySelectorAll('.card.expanded');
        for(var j=0;j<allCards.length;j++) allCards[j].classList.remove('expanded');
        if(!isOpen){
          detail.classList.add('open');
          var annot = document.getElementById('annot-'+id);
          if(annot) annot.classList.add('open');
          var srcLink = this.querySelector('.source-link');
          if(srcLink) srcLink.classList.add('open');
          this.classList.add('expanded');
        }
      }
    });
  }
}

var timer;
searchEl.addEventListener('input',function(){clearTimeout(timer);timer=setTimeout(render,200);searchClearEl.style.display=searchEl.value?'block':'none'});
searchClearEl.addEventListener('click',function(){searchEl.value='';searchClearEl.style.display='none';render()});
render();
})();
</script>
