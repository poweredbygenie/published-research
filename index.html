<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Published Research - Notebook Genie</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#6366f1;--bg:#0f0f13;--bg2:#18181f;--bg3:#22222d;--border:#2d2d3a;--text:#e2e2ed;--muted:#8888a0;--dim:#555568;--radius:8px;--font:system-ui,-apple-system,'Segoe UI',sans-serif}
body{font-family:var(--font);font-size:14px;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:640px;margin:0 auto;padding:40px 20px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.logo{width:36px;height:36px}
.brand h1{font-size:20px;font-weight:700}
.brand p{font-size:12px;color:var(--muted)}
.card{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;text-decoration:none;color:var(--text);transition:border-color .15s}
.card:hover{border-color:var(--accent)}
.card-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.card-info{min-width:0}
.card-title{font-weight:600;font-size:14px}
.card-desc{font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:40px;color:var(--dim)}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

      <path d="M88,78c-1.6-4.2-5.8-6.8-10-6.8c-2.6,0-4.2,1.6-3.4,4.2c0-2.6,2.6-4.2,5.8-2.6c3.4,0.8,5,5,3.4,8.4c-3.4,6.8-11.8,3.4-16,0.8c-2.6-2.6-6.8-5-10-5.8c-3.4,0-7.6,2.6-8.4,5c-0.8-3.4-5-5-8.4-5c-3.4,0.8-7.6,3.4-10,5.8c-4.2,3.4-12.6,5.8-16-0.8c-1.6-3.4,0-6.8,3.4-8.4c3.4-1.6,5,0.8,5.8,2.6c0-2.6-1.6-4.2-3.4-4.2c-4.2-0.8-8.4,2.6-10,6.8c-1.6,5,1.6,10,5.8,13.4c5,3.4,10,3.4,16,2.6s15.2-3.4,16.8-9.2c1.6,6.8,11,9.2,16.8,9.2c5.8,0.8,11,0,16-2.6C86.4,88.8,89.6,83,88,78z" fill="#6366f1"/>

    <div class="brand">
      <h1>Notebook Genie</h1>

</div>
</body>
</html>
